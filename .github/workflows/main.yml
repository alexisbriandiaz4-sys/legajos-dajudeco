name: SAP CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Prisma Generate
      run: npx prisma generate

    - name: Run Linter
      run: npm run lint

    - name: Run Unit & Integration Tests
      run: npm run test
      env:
        NODE_ENV: test
        JWT_SECRET: "test_secret_for_ci_pipeline"
        DATABASE_URL: "postgresql://localhost:5432/test?schema=public"

    - name: Build Application
      run: npm run build
      env:
        NODE_ENV: production
        JWT_SECRET: "mock_secret_for_building_phase_only_do_not_use"
        CLOUDINARY_CLOUD_NAME: "mock"
        CLOUDINARY_API_KEY: "mock"
        CLOUDINARY_API_SECRET: "mock"
        IA_BACKEND_URL: "http://localhost:3000"
        IA_BACKEND_SECRET: "mock"
        DATABASE_URL: "postgresql://localhost:5432/test?schema=public"

    - name: Archive build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: |
          .next
          public
          package.json
          package-lock.json
          prisma
          lib
